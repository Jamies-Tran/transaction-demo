services:
  transaction-log-demo-service:
    build: .
    container_name: transaction-log-demo-service
    networks:
      - transaction-log-network
    expose:
      - 8081
    environment:
      FEIGN_TRANSACTION_LOG_DOMAIN: http://localhost:8082/transaction-log
      FEIGN_TRANSACTION_LOG_SAVE: /v1/history-log
      FEIGN_TRANSACTION_LOG_FILTER_ID: /v1/history-log/{id}
      FEIGN_TRANSACTION_LOG_FILTER_TRANSACTION_ID: /v1/history-log/transactions/{transactionId}

  transaction-log-demo-nginx:
    image: nginx:latest
    container_name: transaction-log-demo-nginx
    networks:
      - transaction-log-network
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8083:80"
    depends_on:
      - transaction-log-demo-service

networks:
  transaction-log-network:
    external: true