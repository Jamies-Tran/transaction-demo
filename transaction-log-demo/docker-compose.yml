services:
  transaction-log-demo-db:
    image: mongo:latest
    container_name: transaction-log-demo-db
    networks:
      - transaction-log-network
    volumes:
      - demo-db:/demo/db
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: transaction-log-demo
      MONGO_INITDB_ROOT_PASSWORD: 123
      MONGO_INITDB_DATABASE: transaction
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      retries: 3
      interval: 5s
      timeout: 10s

  transaction-log-demo-service:
    build: .
    container_name: transaction-log-demo-service
    networks:
      - transaction-log-network
    expose:
      - 8081
    environment:
      FEIGN_TRANSACTION_LOG_DOMAIN: http://localhost:8082/transaction-log
      FEIGN_TRANSACTION_LOG_SAVE: /v1/history-log
      FEIGN_TRANSACTION_LOG_FILTER_ID: /v1/history-log/{id}
      FEIGN_TRANSACTION_LOG_FILTER_TRANSACTION_ID: /v1/history-log/transactions/{transactionId}
      SPRING_DATA_MONGODB_URI: mongodb://transaction-log-demo:123@transaction-log-demo-db:27017/?authSource=admin
      SERVER_PORT: 8080
    depends_on:
      transaction-log-demo-db:
        condition: service_healthy

  transaction-log-demo-nginx:
    image: nginx:latest
    container_name: transaction-log-demo-nginx
    networks:
      - transaction-log-network
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8083:80"
    depends_on:
      - transaction-log-demo-service

networks:
  transaction-log-network:
    external: true

volumes:
  demo-db: